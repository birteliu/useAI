<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>人員帳號管理｜後台管理系統</title>
    <link rel="shortcut icon" href="./images/favicon.ico">
    <meta itemprop="name" content="後台管理系統">
    <meta itemprop="description" content="後台管理系統">
    <link href="css/vendors/bootstrap-icons.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="css/style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <main role="main">
      <!-- 選單 -->
      <nav class="navbar bg-body-tertiary fixed-top">
        <div class="container-fluid">
          <div class="d-flex justify-content-between w-100">
            <div class="d-flex align-items-center">
              <div class="navbar-toggler px-md-2 px-1 py-1 me-md-2 border-0" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation"><i class="bi bi-list"></i></div>
              <div class="fw-bold main-color01-dark h5 mb-0">後台管理<span class="d-sm-inline d-none">系統</span></div>
            </div>
            <div class="d-flex">
              <button class="btn btn-color01 me-2"><i class="bi bi-person-circle me-2 d-sm-inline-block d-none"></i>管理員</button>
              <button class="btn btn-gray" onclick="window.location.href='login.html'"><i class="bi bi-box-arrow-right me-2 d-sm-inline-block d-none"></i>登出</button>
            </div>
          </div>
          <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
            <div class="offcanvas-header">
              <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            <div class="offcanvas-body">
              <h1>LOGO</h1>
              <ul class="list-unstyled pt-3">
                <li><a href="index.html"><i class="bi bi-house me-3"></i>儀表板</a></li>
                <li class="sidebar-group-title">前臺管理</li>
                <li><a href="news.html"><i class="bi bi-newspaper me-3"></i>最新消息管理</a></li>
                <li><a href="events.html"><i class="bi bi-calendar-event me-3"></i>活動消息管理</a></li>
                <li><a href="photo-diary.html"><i class="bi bi-camera me-3"></i>照片日記回顧</a></li>
                <li class="sidebar-group-title">系統管理</li>
                <li><a href="accounts.html" class="active"><i class="bi bi-people me-3"></i>人員帳號管理</a></li>
              </ul>
            </div>
          </div>
        </div>
      </nav>
      <!-- CONTENT -->
      <div class="content container-fluid">
        <div class="page">
          <div class="page-title d-flex justify-content-between align-items-center">
            <div><i class="bi bi-people me-2"></i>人員帳號管理</div>
            <button class="btn btn-color01-dark" data-bs-toggle="modal" data-bs-target="#accountModal"><i class="bi bi-plus-lg me-2 d-sm-inline-block d-none"></i>新增帳號</button>
          </div>
          <!-- 資料表格 -->
          <div class="form-area">
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th scope="col" style="width: 50px;">#</th>
                    <th scope="col">姓名</th>
                    <th scope="col">帳號</th>
                    <th scope="col" style="width: 100px;">角色</th>
                    <th scope="col" style="width: 80px;">狀態</th>
                    <th scope="col" style="width: 120px;">操作</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>1</td>
                    <td>王小明</td>
                    <td>admin</td>
                    <td><span class="badge bg-dark">管理員</span></td>
                    <td><span class="badge badge-active">啟用</span></td>
                    <td>
                      <button class="btn btn-sm btn-color01-dark-outline me-1" data-bs-toggle="modal" data-bs-target="#accountModal"><i class="bi bi-pencil"></i></button>
                      <button class="btn btn-sm btn-outline-danger" data-bs-toggle="modal" data-bs-target="#deleteModal"><i class="bi bi-trash"></i></button>
                    </td>
                  </tr>
                  <tr>
                    <td>2</td>
                    <td>李小華</td>
                    <td>editor01</td>
                    <td><span class="badge bg-secondary">編輯者</span></td>
                    <td><span class="badge badge-active">啟用</span></td>
                    <td>
                      <button class="btn btn-sm btn-color01-dark-outline me-1" data-bs-toggle="modal" data-bs-target="#accountModal"><i class="bi bi-pencil"></i></button>
                      <button class="btn btn-sm btn-outline-danger" data-bs-toggle="modal" data-bs-target="#deleteModal"><i class="bi bi-trash"></i></button>
                    </td>
                  </tr>
                  <tr>
                    <td>3</td>
                    <td>張大嘉</td>
                    <td>editor02</td>
                    <td><span class="badge bg-secondary">編輯者</span></td>
                    <td><span class="badge badge-inactive">停用</span></td>
                    <td>
                      <button class="btn btn-sm btn-color01-dark-outline me-1" data-bs-toggle="modal" data-bs-target="#accountModal"><i class="bi bi-pencil"></i></button>
                      <button class="btn btn-sm btn-outline-danger" data-bs-toggle="modal" data-bs-target="#deleteModal"><i class="bi bi-trash"></i></button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
      <!-- 新增/編輯帳號 Modal -->
      <div class="modal fade" id="accountModal" tabindex="-1" aria-labelledby="accountModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="accountModalLabel">新增帳號</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <div class="mb-3">
                <label class="form-label fw-bold required">姓名</label>
                <input type="text" class="form-control" placeholder="請輸入姓名">
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold required">帳號</label>
                <input type="text" class="form-control" placeholder="請輸入帳號">
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold required">密碼</label>
                <input type="password" class="form-control" placeholder="請輸入密碼">
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">角色</label>
                <div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="role" id="roleAdmin" value="admin">
                    <label class="form-check-label" for="roleAdmin">管理員</label>
                  </div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="role" id="roleEditor" value="editor" checked>
                    <label class="form-check-label" for="roleEditor">編輯者</label>
                  </div>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">狀態</label>
                <div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="accountStatus" id="statusActive" value="active" checked>
                    <label class="form-check-label" for="statusActive">啟用</label>
                  </div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="accountStatus" id="statusInactive" value="inactive">
                    <label class="form-check-label" for="statusInactive">停用</label>
                  </div>
                </div>
              </div>
            </div>
            <div class="modal-footer border-0 justify-content-center">
              <button type="button" class="btn btn-gray" data-bs-dismiss="modal"><i class="bi bi-x me-2"></i>取消</button>
              <button type="button" class="btn btn-color01-dark"><i class="bi bi-save me-2"></i>儲存</button>
            </div>
          </div>
        </div>
      </div>
      <!-- 刪除確認 Modal -->
      <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="deleteModalLabel">確認刪除</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">確定要刪除這個帳號嗎？此操作無法復原。</div>
            <div class="modal-footer border-0 justify-content-center">
              <button type="button" class="btn btn-gray" data-bs-dismiss="modal"><i class="bi bi-x me-2"></i>取消</button>
              <button type="button" class="btn btn-danger"><i class="bi bi-trash me-2"></i>確認刪除</button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="./js/bootstrap.bundle.min.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
