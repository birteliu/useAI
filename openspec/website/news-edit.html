<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>編輯最新消息｜後台管理系統</title>
    <link rel="shortcut icon" href="./images/favicon.ico">
    <meta itemprop="name" content="後台管理系統">
    <meta itemprop="description" content="後台管理系統">
    <link href="css/vendors/bootstrap-icons.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="css/style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <main role="main">
      <!-- 選單 -->
      <nav class="navbar bg-body-tertiary fixed-top">
        <div class="container-fluid">
          <div class="d-flex justify-content-between w-100">
            <div class="d-flex align-items-center">
              <div class="navbar-toggler px-md-2 px-1 py-1 me-md-2 border-0" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation"><i class="bi bi-list"></i></div>
              <div class="fw-bold main-color01-dark h5 mb-0">後台管理<span class="d-sm-inline d-none">系統</span></div>
            </div>
            <div class="d-flex">
              <button class="btn btn-color01 me-2"><i class="bi bi-person-circle me-2 d-sm-inline-block d-none"></i>管理員</button>
              <button class="btn btn-gray" onclick="window.location.href='login.html'"><i class="bi bi-box-arrow-right me-2 d-sm-inline-block d-none"></i>登出</button>
            </div>
          </div>
          <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
            <div class="offcanvas-header">
              <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            <div class="offcanvas-body">
              <h1>LOGO</h1>
              <ul class="list-unstyled pt-3">
                <li><a href="index.html"><i class="bi bi-house me-3"></i>儀表板</a></li>
                <li class="sidebar-group-title">前臺管理</li>
                <li><a href="news.html" class="active"><i class="bi bi-newspaper me-3"></i>最新消息管理</a></li>
                <li><a href="events.html"><i class="bi bi-calendar-event me-3"></i>活動消息管理</a></li>
                <li><a href="photo-diary.html"><i class="bi bi-camera me-3"></i>照片日記回顧</a></li>
                <li class="sidebar-group-title">系統管理</li>
                <li><a href="accounts.html"><i class="bi bi-people me-3"></i>人員帳號管理</a></li>
              </ul>
            </div>
          </div>
        </div>
      </nav>
      <!-- CONTENT -->
      <div class="content container-fluid">
        <div class="page">
          <div class="page-title">
            <div><i class="bi bi-newspaper me-2"></i>新增最新消息</div>
          </div>
          <div class="form-area p-3">
            <!-- 標題 -->
            <div class="mb-3">
              <label class="form-label fw-bold required">標題</label>
              <input type="text" class="form-control" placeholder="請輸入標題">
            </div>
            <!-- 封面圖片 -->
            <div class="mb-3">
              <label class="form-label fw-bold">封面圖片</label>
              <input class="form-control" type="file" accept="image/*">
              <div class="mt-2">
                <img src="https://placehold.co/200x120?text=預覽圖片" class="img-thumbnail" style="max-width: 200px;" alt="封面預覽">
              </div>
            </div>
            <!-- 內容 -->
            <div class="mb-3">
              <label class="form-label fw-bold required">內容</label>
              <textarea class="form-control" rows="8" placeholder="請輸入內容"></textarea>
            </div>
            <!-- 發布日期 -->
            <div class="mb-3">
              <label class="form-label fw-bold">發布日期</label>
              <input type="date" class="form-control" style="max-width: 250px;">
            </div>
            <!-- 狀態 -->
            <div class="mb-3">
              <label class="form-label fw-bold">狀態</label>
              <div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="status" id="statusDraft" value="draft" checked>
                  <label class="form-check-label" for="statusDraft">草稿</label>
                </div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="status" id="statusPublished" value="published">
                  <label class="form-check-label" for="statusPublished">上架</label>
                </div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="status" id="statusUnpublished" value="unpublished">
                  <label class="form-check-label" for="statusUnpublished">下架</label>
                </div>
              </div>
            </div>
            <!-- 置頂 -->
            <div class="mb-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="pinTop">
                <label class="form-check-label fw-bold" for="pinTop">設為置頂</label>
              </div>
            </div>
            <!-- 排序 -->
            <div class="mb-3">
              <label class="form-label fw-bold">排序</label>
              <input type="number" class="form-control" style="max-width: 120px;" placeholder="0" min="0">
            </div>
          </div>
        </div>
        <!-- 底部固定操作列 -->
        <div class="fixed-bottom bg-white d-flex align-items-center justify-content-center py-2 shadow-lg">
          <button type="button" class="btn btn-secondary me-2" onclick="window.location.href='news.html'"><i class="bi bi-x me-2 d-sm-inline-block d-none"></i>取消</button>
          <button type="button" class="btn btn-color01-dark"><i class="bi bi-save me-2 d-sm-inline-block d-none"></i>儲存</button>
        </div>
      </div>
    </main>
    <script src="./js/bootstrap.bundle.min.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
