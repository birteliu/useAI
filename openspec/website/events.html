<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>活動消息管理｜後台管理系統</title>
    <link rel="shortcut icon" href="./images/favicon.ico">
    <meta itemprop="name" content="後台管理系統">
    <meta itemprop="description" content="後台管理系統">
    <link href="css/vendors/bootstrap-icons.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="css/style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <main role="main">
      <!-- 選單 -->
      <nav class="navbar bg-body-tertiary fixed-top">
        <div class="container-fluid">
          <div class="d-flex justify-content-between w-100">
            <div class="d-flex align-items-center">
              <div class="navbar-toggler px-md-2 px-1 py-1 me-md-2 border-0" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation"><i class="bi bi-list"></i></div>
              <div class="fw-bold main-color01-dark h5 mb-0">後台管理<span class="d-sm-inline d-none">系統</span></div>
            </div>
            <div class="d-flex">
              <button class="btn btn-color01 me-2"><i class="bi bi-person-circle me-2 d-sm-inline-block d-none"></i>管理員</button>
              <button class="btn btn-gray" onclick="window.location.href='login.html'"><i class="bi bi-box-arrow-right me-2 d-sm-inline-block d-none"></i>登出</button>
            </div>
          </div>
          <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
            <div class="offcanvas-header">
              <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            <div class="offcanvas-body">
              <h1>LOGO</h1>
              <ul class="list-unstyled pt-3">
                <li><a href="index.html"><i class="bi bi-house me-3"></i>儀表板</a></li>
                <li class="sidebar-group-title">前臺管理</li>
                <li><a href="news.html"><i class="bi bi-newspaper me-3"></i>最新消息管理</a></li>
                <li><a href="events.html" class="active"><i class="bi bi-calendar-event me-3"></i>活動消息管理</a></li>
                <li><a href="photo-diary.html"><i class="bi bi-camera me-3"></i>照片日記回顧</a></li>
                <li class="sidebar-group-title">系統管理</li>
                <li><a href="accounts.html"><i class="bi bi-people me-3"></i>人員帳號管理</a></li>
              </ul>
            </div>
          </div>
        </div>
      </nav>
      <!-- CONTENT -->
      <div class="content container-fluid">
        <div class="page">
          <div class="page-title d-flex justify-content-between align-items-center">
            <div><i class="bi bi-calendar-event me-2"></i>活動消息管理</div>
            <button class="btn btn-color01-dark" onclick="window.location.href='event-edit.html'"><i class="bi bi-plus-lg me-2 d-sm-inline-block d-none"></i>新增活動</button>
          </div>
          <!-- 搜尋區 -->
          <div class="search-area row g-0 mb-3">
            <div class="col-sm-4">
              <div class="search-item d-flex align-items-center">
                <label class="search-title"><i class="bi bi-funnel me-2"></i>狀態</label>
                <select class="form-select" aria-label="狀態篩選">
                  <option selected>全部</option>
                  <option value="draft">草稿</option>
                  <option value="published">上架</option>
                  <option value="unpublished">下架</option>
                </select>
              </div>
            </div>
            <div class="col-sm-4">
              <div class="search-item d-flex align-items-center">
                <label class="search-title"><i class="bi bi-card-text me-2"></i>關鍵字</label>
                <input class="form-control" type="text" placeholder="請輸入" aria-label="關鍵字搜尋">
              </div>
            </div>
            <div class="col-sm-4">
              <div class="d-flex h-100">
                <button class="btn btn-white btn-clear flex-fill"><i class="bi bi-eraser me-2"></i>清除</button>
                <button class="btn btn-color01-dark btn-search flex-fill"><i class="bi bi-search me-2"></i>搜尋</button>
              </div>
            </div>
          </div>
          <!-- 資料表格 -->
          <div class="form-area">
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th scope="col" style="width: 50px;">#</th>
                    <th scope="col">標題</th>
                    <th scope="col" style="width: 200px;">活動日期</th>
                    <th scope="col" style="width: 80px;">狀態</th>
                    <th scope="col" style="width: 120px;">操作</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>1</td>
                    <td>年度音樂會</td>
                    <td>2026/05/10 ~ 2026/05/12</td>
                    <td><span class="badge badge-published">上架</span></td>
                    <td>
                      <button class="btn btn-sm btn-color01-dark-outline me-1" onclick="window.location.href='event-edit.html'"><i class="bi bi-pencil"></i></button>
                      <button class="btn btn-sm btn-outline-danger" data-bs-toggle="modal" data-bs-target="#deleteModal"><i class="bi bi-trash"></i></button>
                    </td>
                  </tr>
                  <tr>
                    <td>2</td>
                    <td>親子手作工作坊</td>
                    <td>2026/04/20 ~ 2026/04/20</td>
                    <td><span class="badge badge-published">上架</span></td>
                    <td>
                      <button class="btn btn-sm btn-color01-dark-outline me-1" onclick="window.location.href='event-edit.html'"><i class="bi bi-pencil"></i></button>
                      <button class="btn btn-sm btn-outline-danger" data-bs-toggle="modal" data-bs-target="#deleteModal"><i class="bi bi-trash"></i></button>
                    </td>
                  </tr>
                  <tr>
                    <td>3</td>
                    <td>冬季慈善義賣</td>
                    <td>2025/12/20 ~ 2025/12/22</td>
                    <td><span class="badge badge-unpublished">下架</span></td>
                    <td>
                      <button class="btn btn-sm btn-color01-dark-outline me-1" onclick="window.location.href='event-edit.html'"><i class="bi bi-pencil"></i></button>
                      <button class="btn btn-sm btn-outline-danger" data-bs-toggle="modal" data-bs-target="#deleteModal"><i class="bi bi-trash"></i></button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
            <!-- 分頁 -->
            <div class="d-flex justify-content-between align-items-center mt-3 px-2">
              <div class="text-muted small">顯示 1-3 / 共 18 筆</div>
              <nav aria-label="Page navigation">
                <ul class="pagination pagination-sm mb-0">
                  <li class="page-item disabled"><a class="page-link" href="#">&laquo;</a></li>
                  <li class="page-item active"><a class="page-link" href="#">1</a></li>
                  <li class="page-item"><a class="page-link" href="#">2</a></li>
                  <li class="page-item"><a class="page-link" href="#">&raquo;</a></li>
                </ul>
              </nav>
            </div>
          </div>
        </div>
      </div>
      <!-- 刪除確認 Modal -->
      <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="deleteModalLabel">確認刪除</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">確定要刪除這筆活動嗎？此操作無法復原。</div>
            <div class="modal-footer border-0 justify-content-center">
              <button type="button" class="btn btn-gray" data-bs-dismiss="modal"><i class="bi bi-x me-2"></i>取消</button>
              <button type="button" class="btn btn-danger"><i class="bi bi-trash me-2"></i>確認刪除</button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="./js/bootstrap.bundle.min.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
