<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>登入｜後台管理系統</title>
    <link rel="shortcut icon" href="./images/favicon.ico">
    <meta itemprop="name" content="後台管理系統">
    <meta itemprop="description" content="後台管理系統">
    <link href="css/vendors/bootstrap-icons.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="css/style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <main role="main">
      <div class="container-fluid">
        <div class="login d-flex align-items-center justify-content-center">
          <div class="col-md-6">
            <div class="login-box bg-white">
              <div class="fw-bold text-center h4 mb-4">帳號登入</div>
              <div class="input-group mb-3">
                <span class="input-group-text login-name px-4"><i class="bi bi-person me-2"></i>帳號</span>
                <input type="text" class="form-control form-control-lg" placeholder="帳號" aria-label="帳號">
              </div>
              <div class="input-group mb-3">
                <span class="input-group-text login-name px-4"><i class="bi bi-key me-2"></i>密碼</span>
                <input type="password" class="form-control form-control-lg" placeholder="密碼" aria-label="密碼">
              </div>
              <div class="input-group mb-3">
                <span class="input-group-text login-name px-4">驗證碼</span>
                <input type="text" class="form-control form-control-lg" placeholder="請輸入驗證碼" aria-label="驗證碼">
                <img class="input-group-text py-0 px-1" src="https://placehold.co/105x40" alt="驗證碼圖片">
              </div>
              <div class="text-center"><button type="submit" class="btn btn-color01 btn-lg rounded-pill px-5" onclick="window.location.href='index.html'">登入</button></div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="./js/bootstrap.bundle.min.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
